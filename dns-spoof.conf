# DNS Spoofing Configuration for dnsmasq
# Add entries below to override DNS responses for LAN clients
#
# Format: address=/domain/ip
#   - Responds to queries for domain (and all subdomains) with the specified IP
#
# Examples:
# address=/example.com/192.168.200.1        # Redirect example.com and *.example.com to router
# address=/api.iot-vendor.com/192.168.200.1 # Intercept IoT API calls
# address=/updates.device.com/127.0.0.1     # Block update server
#
# To apply changes: ./dns-spoof.sh reload (restarts dnsmasq)
# Note: SIGHUP does NOT reload config files, full restart required
#
# IMPORTANT for intercept mode:
# - Only add INTERCEPT domains here (traffic goes to fake server)
# - Do NOT add PASSTHROUGH domains (they must resolve to real IPs)
# - Passthrough domains bypass mitmproxy entirely for real TLS certificates

# Add your domains below:
# address=/update.example.com/192.168.200.1
# address=/api.example.com/192.168.200.1
